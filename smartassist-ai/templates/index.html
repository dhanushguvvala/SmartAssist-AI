<!DOCTYPE html>
<html>
<head>

<title>SmartAssist AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>🤖 SmartAssist AI</h1>

<p class="subtitle">
Multi-Purpose Productivity Assistant with AI Memory,
Voice Input and Smart Summarization
</p>

<select id="mode" class="form-select mb-3">
    <option>General</option>
    <option>Coding</option>
    <option>Study</option>
    <option>Resume</option>
</select>

<div id="chatbox"></div>

<input
type="text"
id="message"
class="form-control"
placeholder="Ask anything..."
>

<div class="button-group">

<button class="btn btn-primary" onclick="sendMessage()">
Send
</button>

<button class="btn btn-success" onclick="summarizeChat()">
Summarize
</button>

<a href="/export" class="btn btn-danger">
Export PDF
</a>

<button class="btn btn-warning" onclick="startVoice()">
🎤 Voice
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
